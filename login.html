<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOBILLUG — 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: rgba(255,255,255,0.07);
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --danger: #ef4444;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #64748b;
    --success: #22c55e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* 배경 효과 */
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(59,130,246,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -10%;
    width: 60%;
    height: 60%;
    background: radial-gradient(ellipse, rgba(96,165,250,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .login-wrap {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 440px;
    padding: 20px;
  }

  .logo-area {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease both;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 18px;
    margin-bottom: 20px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .logo-text {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  .page-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .page-sub {
    font-size: 13px;
    color: var(--text3);
    letter-spacing: 0.02em;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    animation: fadeUp 0.6s ease 0.1s both;
    backdrop-filter: blur(10px);
  }

  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }

  input::placeholder { color: var(--text3); }

  .btn-login {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 14px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  .btn-login:hover:not(:disabled) {
    background: #2563eb;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(59,130,246,0.35);
  }

  .btn-login:active:not(:disabled) { transform: translateY(0); }

  .btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .btn-login .spinner {
    display: none;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  .btn-login.loading .btn-text { display: none; }
  .btn-login.loading .spinner { display: block; }

  .error-msg {
    display: none;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #fca5a5;
    margin-top: 16px;
    animation: shake 0.3s ease;
  }

  .error-msg.show { display: block; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  .info-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text3);
  }

  .info-row .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    flex-shrink: 0;
    animation: pulse 2s ease infinite;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="login-wrap">
  <div class="logo-area">
    <div class="logo-badge">
      <div class="logo-icon">🚗</div>
      <span class="logo-text">MOBILLUG</span>
    </div>
    <h1 class="page-title">대리점 출고 실적</h1>
    <p class="page-sub">일일 실적 보고 시스템 · 로그인이 필요합니다</p>
  </div>

  <div class="card">
    <div class="field">
      <label>이메일</label>
      <input type="email" id="email" placeholder="이메일 주소 입력" autocomplete="email">
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" id="password" placeholder="비밀번호 입력" autocomplete="current-password">
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span class="btn-text">로그인</span>
      <div class="spinner"></div>
    </button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="divider"></div>

    <div class="info-row">
      <span class="dot"></span>
      <span>계정 문의는 관리자에게 연락하세요</span>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAtdO1c-bvADTGYdIEAfGN_Pc36g2hL3_4",
    authDomain: "mobilog-report.firebaseapp.com",
    databaseURL: "https://mobilog-report-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "mobilog-report",
    storageBucket: "mobilog-report.firebasestorage.app",
    messagingSenderId: "135384880017",
    appId: "1:135384880017:web:568e70398e403a0116c030",
    measurementId: "G-PM8GWE977M"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // 이미 로그인된 경우 바로 이동
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const role = await getUserRole(user.uid);
      redirectToReport(role);
    }
  });

  async function getUserRole(uid) {
    try {
      const snap = await get(ref(db, `users/${uid}/role`));
      return snap.val() || 'user';
    } catch { return 'user'; }
  }

  function redirectToReport(role) {
    if (role === 'admin') {
      window.location.href = 'report.html?role=admin';
    } else {
      window.location.href = 'report.html?role=user';
    }
  }

  window.doLogin = async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('errorMsg');

    errEl.classList.remove('show');

    if (!email || !password) {
      showError('이메일과 비밀번호를 입력해주세요.');
      return;
    }

    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const role = await getUserRole(cred.user.uid);
      redirectToReport(role);
    } catch (e) {
      btn.disabled = false;
      btn.classList.remove('loading');
      const msgs = {
        'auth/user-not-found': '등록되지 않은 이메일입니다.',
        'auth/wrong-password': '비밀번호가 올바르지 않습니다.',
        'auth/invalid-email': '이메일 형식이 올바르지 않습니다.',
        'auth/too-many-requests': '로그인 시도가 너무 많습니다. 잠시 후 다시 시도해주세요.',
        'auth/invalid-credential': '이메일 또는 비밀번호가 올바르지 않습니다.',
      };
      showError(msgs[e.code] || '로그인 중 오류가 발생했습니다.');
    }
  };

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }

  // 엔터키 로그인
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.doLogin();
  });
  document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOBILLUG — 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #fff;
    color: #1a1a2e;
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-wrap {
    width: 100%;
    max-width: 380px;
    padding: 24px;
    animation: fadeUp 0.5s ease both;
  }
  .logo-area {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo-title {
    font-size: 26px;
    font-weight: 900;
    color: #1a1a2e;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }
  .logo-sub {
    font-size: 13px;
    color: #9ca3af;
    font-weight: 400;
  }
  .field { margin-bottom: 14px; position: relative; }
  input {
    width: 100%;
    background: #fff;
    border: 1.5px solid #e5e7eb;
    border-radius: 8px;
    padding: 14px 16px;
    color: #1a1a2e;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
  }
  input::placeholder { color: #d1d5db; }
  .pw-wrap { position: relative; }
  .pw-toggle {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #9ca3af;
    font-size: 16px;
    padding: 0;
    line-height: 1;
  }
  .save-id {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #6b7280;
    cursor: pointer;
    user-select: none;
  }
  .save-id input[type=checkbox] {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1.5px solid #d1d5db;
    padding: 0;
    accent-color: #2563eb;
    cursor: pointer;
  }
  .btn-login {
    width: 100%;
    background: #2563eb;
    border: none;
    border-radius: 8px;
    padding: 15px;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 20px;
  }
  .btn-login:hover:not(:disabled) {
    background: #1d4ed8;
    box-shadow: 0 4px 16px rgba(37,99,235,0.3);
  }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-login .spinner {
    display: none;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  .btn-login.loading .btn-text { display: none; }
  .btn-login.loading .spinner { display: block; }
  .pw-change {
    text-align: center;
    font-size: 13px;
    color: #9ca3af;
    text-decoration: underline;
    cursor: pointer;
    background: none;
    border: none;
    width: 100%;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .error-msg {
    display: none;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #dc2626;
    margin-bottom: 14px;
    animation: shake 0.3s ease;
  }
  .error-msg.show { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo-area">
    <div class="logo-title">MOBILLUG</div>
    <div class="logo-sub">대리점 출고 실적 보고 시스템</div>
  </div>

  <div class="field">
    <input type="email" id="email" placeholder="아이디(이메일)" autocomplete="email">
  </div>

  <div class="field pw-wrap">
    <input type="password" id="password" placeholder="비밀번호" autocomplete="current-password">
    <button class="pw-toggle" type="button" onclick="togglePw()" id="pwToggleBtn">👁</button>
  </div>

  <label class="save-id">
    <input type="checkbox" id="saveId"> 아이디 저장
  </label>

  <div class="error-msg" id="errorMsg"></div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">
    <span class="btn-text">로그인</span>
    <div class="spinner"></div>
  </button>

  <button class="pw-change" onclick="alert('비밀번호 변경은 관리자에게 문의하세요.')">
    비밀번호 변경
  </button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAtdO1c-bvADTGYdIEAfGN_Pc36g2hL3_4",
    authDomain: "mobilog-report.firebaseapp.com",
    databaseURL: "https://mobilog-report-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "mobilog-report",
    storageBucket: "mobilog-report.firebasestorage.app",
    messagingSenderId: "135384880017",
    appId: "1:135384880017:web:568e70398e403a0116c030",
    measurementId: "G-PM8GWE977M"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const savedId = localStorage.getItem('mobilrg_saved_id');
  if (savedId) {
    document.getElementById('email').value = savedId;
    document.getElementById('saveId').checked = true;
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) { window.location.href = 'report.html'; }
  });

  window.doLogin = async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const saveId = document.getElementById('saveId').checked;
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('errorMsg');

    errEl.classList.remove('show');
    if (!email || !password) { showError('아이디와 비밀번호를 입력해주세요.'); return; }

    if (saveId) { localStorage.setItem('mobilrg_saved_id', email); }
    else { localStorage.removeItem('mobilrg_saved_id'); }

    btn.disabled = true;
    btn.classList.add('loading');

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = 'report.html';
    } catch (e) {
      btn.disabled = false;
      btn.classList.remove('loading');
      const msgs = {
        'auth/user-not-found': '등록되지 않은 이메일입니다.',
        'auth/wrong-password': '비밀번호가 올바르지 않습니다.',
        'auth/invalid-email': '이메일 형식이 올바르지 않습니다.',
        'auth/too-many-requests': '로그인 시도가 너무 많습니다. 잠시 후 다시 시도해주세요.',
        'auth/invalid-credential': '아이디 또는 비밀번호가 올바르지 않습니다.',
      };
      showError(msgs[e.code] || '로그인 중 오류가 발생했습니다.');
    }
  };

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }

  window.togglePw = function() {
    const inp = document.getElementById('password');
    const btn = document.getElementById('pwToggleBtn');
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
  };

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.doLogin();
  });
  document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });
</script>
</body>
</html>

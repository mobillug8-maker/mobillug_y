<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모빌러그 장기렌트 - 대리점 출고 일일 실적 보고</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#F8FAFC;color:#374151;min-height:100vh;}
  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
  input[type=number]{-moz-appearance:textfield;}
  button{cursor:pointer;font-family:inherit;}
  select{font-family:inherit;}

  /* 헤더 */
  #header{background:linear-gradient(135deg,#4A2776,#6B3FA0 60%,#8B5CF6);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(107,63,160,.3);}
  #header h1{color:#fff;font-size:17px;font-weight:800;}
  #header p{color:rgba(255,255,255,.65);font-size:10px;margin-top:2px;}
  .header-btns{display:flex;gap:8px;}
  .header-btns button{padding:6px 14px;border-radius:7px;border:none;font-size:12px;font-weight:700;background:rgba(255,255,255,.18);color:#fff;transition:all .2s;}
  .header-btns button:hover{background:rgba(255,255,255,.28);}
  #btn-save.saved{background:#16A34A!important;}

  /* 탭 */
  #tabs{display:flex;gap:2px;padding:10px 20px 0;background:#fff;border-bottom:2px solid #E5E7EB;overflow-x:auto;}
  .tab-item{display:flex;align-items:flex-end;}
  .tab-btn{padding:7px 14px;border-radius:6px 6px 0 0;border:none;font-size:12px;font-weight:500;background:transparent;color:#374151;margin-bottom:-2px;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;}
  .tab-btn.active{font-weight:800;background:#6B3FA0;color:#fff;border-bottom:2px solid #6B3FA0;}
  .tab-del{padding:2px 5px;border:none;background:transparent;color:#9CA3AF;font-size:10px;margin-bottom:-2px;}
  .tab-del:hover{color:#DC2626;}

  /* 본문 */
  #body{padding:14px 14px 40px;}

  /* KPI 카드 */
  #kpi-row{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;}
  .kpi-card{flex:1 1 90px;background:#fff;border-radius:9px;padding:10px 13px;box-shadow:0 1px 4px rgba(0,0,0,.07);min-width:90px;}
  .kpi-label{font-size:9px;color:#9CA3AF;margin-bottom:2px;}
  .kpi-value{font-size:20px;font-weight:800;line-height:1.1;}
  .kpi-sub{font-size:9px;color:#9CA3AF;margin-top:1px;}

  /* 목표 바 */
  #goal-bar{background:#fff;border-radius:10px;padding:12px 16px;margin-bottom:13px;box-shadow:0 1px 6px rgba(0,0,0,.07);display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
  .goal-target{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:#374151;}
  .goal-target span.val{font-size:15px;font-weight:800;color:#6B3FA0;}
  #btn-edit-target{padding:2px 9px;border-radius:5px;border:1px solid #E5E7EB;font-size:11px;background:#fff;color:#374151;}
  #target-input{width:75px;padding:4px 8px;border:1px solid #6B3FA0;border-radius:6px;font-size:13px;outline:none;display:none;}
  .goal-stats{display:flex;gap:16px;font-size:11px;color:#374151;flex-wrap:wrap;}
  .goal-progress{flex:1;min-width:160px;}
  .progress-label{display:flex;justify-content:space-between;font-size:10px;color:#9CA3AF;margin-bottom:4px;}
  .progress-bar-bg{background:#E5E7EB;border-radius:99px;height:9px;overflow:hidden;}
  .progress-bar-fill{height:100%;border-radius:99px;transition:width .4s;}
  .progress-note{font-size:9px;color:#9CA3AF;margin-top:3px;}

  /* 테이블 래퍼 */
  #table-wrap{overflow-x:auto;border-radius:10px;box-shadow:0 2px 14px rgba(0,0,0,.09);border:1px solid #E5E7EB;background:#fff;}
  table{border-collapse:collapse;font-size:11px;width:100%;}
  th,td{white-space:nowrap;}

  /* 테이블 헤더 */
  .th-title{background:#6B3FA0;color:#fff;text-align:center;padding:9px 4px;font-size:13px;font-weight:800;}
  .th-week{color:rgba(255,255,255,.8);text-align:center;font-size:10px;font-weight:700;padding:5px 2px;border-right:1px solid #555;}
  .th-item{background:#374151;color:#fff;font-size:10px;font-weight:700;padding:5px 8px;text-align:left;border-right:1px solid #555;}
  .th-brand{background:#374151;border-right:1px solid #555;}
  .th-total-hd{background:#4A2776;color:#fff;text-align:center;font-size:10px;font-weight:800;vertical-align:middle;padding:4px 2px;}
  .th-day{text-align:center;padding:3px 1px;font-size:9px;font-weight:600;border-right:1px solid #374151;border-bottom:1px solid #555;white-space:nowrap;}
  .th-day div:first-child{line-height:1.2;}
  .th-day div:last-child{font-size:8px;opacity:.85;}

  /* 데이터 행 */
  .row-label{background:#fff;color:#374151;font-size:10px;font-weight:600;padding:3px 8px;border-right:1px solid #E5E7EB;border-bottom:1px solid #E5E7EB;}
  .brand-cell{color:#fff;text-align:center;font-size:9px;font-weight:800;padding:3px 2px;border-right:1px solid #E5E7EB;border-bottom:1px solid #E5E7EB;writing-mode:vertical-rl;letter-spacing:2px;vertical-align:middle;}
  .data-cell{border-right:1px solid #E5E7EB;border-bottom:1px solid #E5E7EB;padding:1px;}
  .data-cell input{width:100%;height:24px;border:none;background:transparent;text-align:center;font-size:11px;font-family:inherit;outline:none;padding:0;}
  .data-cell input:focus{background:#FEF9C3;border-radius:3px;}
  .data-cell input:disabled{cursor:default;color:#9CA3AF;}
  .sum-cell{background:#4A2776;color:#fff;text-align:center;font-size:11px;font-weight:800;padding:3px 2px;border-bottom:1px solid #3730A3;}
  .computed-label{font-size:10px;font-weight:800;padding:5px 8px;border-right:1px solid #E5E7EB;border-bottom:1px solid #E5E7EB;}
  .computed-cell{text-align:center;font-size:11px;padding:5px 1px;border-right:1px solid #E5E7EB;border-bottom:1px solid #E5E7EB;}
  .computed-total{text-align:center;font-size:12px;font-weight:800;padding:5px 2px;}

  /* 범례 */
  #legend{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;font-size:11px;color:#9CA3AF;align-items:center;background:#fff;border-radius:8px;padding:8px 14px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
  #legend span.title{font-weight:600;color:#374151;}


  /* ▲▼ 스피너 버튼 */
  .data-cell{position:relative;}
  .data-cell:hover .spin-btns{display:flex;}
  .spin-btns{display:none;position:absolute;right:1px;top:50%;transform:translateY(-50%);flex-direction:column;gap:0;z-index:10;}
  .spin-btn{width:13px;height:11px;border:none;background:rgba(107,63,160,.18);color:#6B3FA0;font-size:8px;line-height:1;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;}
  .spin-btn:hover{background:#6B3FA0;color:#fff;}
  .spin-btn:first-child{border-radius:2px 2px 0 0;}
  .spin-btn:last-child{border-radius:0 0 2px 2px;}

  /* 발주 차량 섹션 */
  #order-section{margin-top:18px;background:#fff;border-radius:12px;box-shadow:0 2px 14px rgba(0,0,0,.09);border:1px solid #E5E7EB;overflow:hidden;}
  #order-header{background:linear-gradient(135deg,#4A2776,#6B3FA0);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
  #order-header h2{color:#fff;font-size:14px;font-weight:800;}
  #order-tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 16px 0;border-bottom:2px solid #E5E7EB;background:#F8FAFC;}
  .order-tab{padding:6px 14px;border-radius:6px 6px 0 0;border:none;font-size:11px;font-weight:600;background:transparent;color:#6B7280;cursor:pointer;white-space:nowrap;margin-bottom:-2px;border-bottom:2px solid transparent;}
  .order-tab.active{background:#6B3FA0;color:#fff;border-bottom:2px solid #6B3FA0;font-weight:800;}
  #order-body{padding:16px;}
  .order-day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:14px;}
  .order-day-card{border:1px solid #E5E7EB;border-radius:8px;overflow:hidden;}
  .order-day-title{background:#374151;color:#fff;font-size:10px;font-weight:700;padding:4px 8px;display:flex;justify-content:space-between;align-items:center;}
  .order-day-title.holiday{background:#BE185D;}
  .order-day-title.weekend{background:#6B7280;}
  .order-car-list{padding:4px;}
  .order-car-item{display:flex;align-items:center;gap:4px;padding:2px 4px;border-radius:4px;margin-bottom:2px;background:#F3EEF9;}
  .order-car-item input{flex:1;border:none;background:transparent;font-size:11px;font-family:inherit;outline:none;color:#374151;min-width:0;}
  .order-car-item button{border:none;background:transparent;color:#DC2626;font-size:11px;cursor:pointer;padding:0 2px;flex-shrink:0;}
  .order-add-btn{width:100%;border:1px dashed #D1D5DB;background:transparent;color:#9CA3AF;font-size:10px;padding:3px;cursor:pointer;border-radius:4px;margin-top:2px;font-family:inherit;}
  .order-add-btn:hover{border-color:#6B3FA0;color:#6B3FA0;}
  .order-summary{background:#F3EEF9;border-radius:8px;padding:12px 16px;}
  .order-summary h3{font-size:12px;font-weight:800;color:#4A2776;margin-bottom:8px;}
  .order-summary-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .order-car-badge{background:#fff;border:1px solid #E5E7EB;border-radius:6px;padding:5px 10px;font-size:11px;display:flex;gap:8px;}
  .order-car-badge span:first-child{color:#374151;font-weight:600;}
  .order-car-badge span:last-child{color:#6B3FA0;font-weight:800;}

  /* 모달 */
  #modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center;}
  #modal-overlay.show{display:flex;}
  #modal{background:#fff;border-radius:14px;padding:28px;min-width:280px;box-shadow:0 8px 32px rgba(0,0,0,.2);}
  #modal h2{font-size:15px;font-weight:800;margin-bottom:18px;color:#4A2776;}
  .modal-row{display:flex;gap:10px;margin-bottom:12px;}
  .modal-field label{font-size:11px;color:#9CA3AF;margin-bottom:4px;display:block;}
  .modal-field input,.modal-field select{padding:6px 10px;border:1px solid #E5E7EB;border-radius:7px;font-size:14px;font-family:inherit;outline:none;}
  #modal-target-info{border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:11px;}
  .modal-btns{display:flex;gap:8px;}
  .modal-btns button{flex:1;padding:8px;border-radius:7px;font-size:13px;font-family:inherit;}
  #btn-modal-cancel{border:1px solid #E5E7EB;background:#fff;color:#374151;}
  #btn-modal-add{border:none;background:#6B3FA0;color:#fff;font-weight:700;}
</style>

function showSyncToast(msg) {
  let toast = document.getElementById("sync-toast");
  if (!toast) {
    toast = document.createElement("div");
    toast.id = "sync-toast";
    toast.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#374151;color:#fff;padding:9px 22px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;";
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = "1";
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { toast.style.opacity = "0"; }, 2200);
}


const DOW = ["일","월","화","수","목","금","토"];

function mKey(y,m){return`${y}-${String(m).padStart(2,'0')}`;}
function mLabel(y,m){return`${String(y).slice(2)}년 ${m}월`;}
function getDays(y,m){return new Date(y,m,0).getDate();}
function getDayStatus(y,m,d){
  const dow=new Date(y,m-1,d).getDay();
  const key=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  if(HOLIDAYS.has(key))return'holiday';
  if(dow===0||dow===6)return'weekend';
  return'working';
}
function getWorkingDays(y,m){
  const r=[];for(let d=1;d<=getDays(y,m);d++)if(getDayStatus(y,m,d)==='working')r.push(d);return r;
}
function getWeeks(y,m){
  const days=getDays(y,m),weeks=[];let week=[];
  for(let d=1;d<=days;d++){
    week.push(d);
    if(new Date(y,m-1,d).getDay()===0||d===days){weeks.push([...week]);week=[];}
  }
  if(week.length)weeks.push(week);
  return weeks;
}
function makeEmpty(y,m){return{year:y,month:m,target:MONTH_TARGETS[m]||78,H진행:{},H발주:{},H출고:{},K진행:{},K발주:{},K출고:{}};}

// 초기 데이터
function initData(){
  const d={};
  const k1=mKey(2026,3);d[k1]=makeEmpty(2026,3);
  Object.assign(d[k1],{H진행:{3:14,4:14,5:12,6:14,9:14,10:11},H발주:{3:2,4:1,5:1,10:1},H출고:{4:1},K진행:{3:3,5:4,6:6,9:3,10:3},K발주:{3:1,5:3,6:2,9:1},K출고:{5:1}});
  const k2=mKey(2026,2);d[k2]=makeEmpty(2026,2);
  Object.assign(d[k2],{target:239,H진행:{2:10,3:9,4:14,5:8,6:7},K진행:{2:1,3:5,4:2,5:3,6:2}});
  return d;
}

// 상태
let state = {months:{},order:[],active:""};

function loadState(){
  // Firebase 실시간 리스너가 데이터를 불러오므로 초기값 반환
  const months=initData();
  return{months,order:[mKey(2026,3),mKey(2026,2)],active:mKey(2026,3)};
}

function saveData(){
  const btn=document.getElementById("btn-save");
  btn.textContent="⏳ 저장 중...";
  DATA_REF.set(state)
    .then(()=>{
      btn.textContent="✅ 저장됨";btn.classList.add("saved");
      showSyncToast("💾 Firebase에 저장되었습니다!");
      setTimeout(()=>{btn.textContent="💾 저장";btn.classList.remove("saved");},1800);
    })
    .catch((e)=>{
      btn.textContent="❌ 저장 실패";
      showSyncToast("⚠️ 저장 실패: "+e.message);
      setTimeout(()=>{btn.textContent="💾 저장";},2000);
    });
}

// ── 계산 ──────────────────────────────────────────────────────────────────────
function getMon(){return state.months[state.active];}
function getVal(key,day){const v=getMon()[key][day];return v===undefined?null:v;}
function totalJin(d){return(getVal("H진행",d)||0)+(getVal("K진행",d)||0);}
function totalOut(d){return(getVal("H출고",d)||0)+(getVal("K출고",d)||0);}
function sumKey(key){return Object.values(getMon()[key]||{}).reduce((a,b)=>a+(b||0),0);}
function sumJin(){let s=0;const{year,month}=getMon();for(let d=1;d<=getDays(year,month);d++)s+=totalJin(d);return s;}
function sumOut(){let s=0;const{year,month}=getMon();for(let d=1;d<=getDays(year,month);d++)s+=totalOut(d);return s;}

// ── 렌더링 ────────────────────────────────────────────────────────────────────
function render(){
  renderTabs();
  renderKPI();
  renderGoalBar();
  renderTable();
  renderOrderSection();
}

function renderTabs(){
  const el=document.getElementById('tabs');
  el.innerHTML='';
  state.order.forEach(key=>{
    const m=state.months[key];if(!m)return;
    const isA=key===state.active;
    const div=document.createElement('div');div.className='tab-item';
    const btn=document.createElement('button');
    btn.className='tab-btn'+(isA?' active':'');
    btn.textContent=mLabel(m.year,m.month);
    btn.onclick=()=>{state.active=key;render();};
    div.appendChild(btn);
    if(!isA&&state.order.length>1){
      const del=document.createElement('button');del.className='tab-del';del.textContent='✕';
      del.onclick=()=>deleteMonth(key);div.appendChild(del);
    }
    el.appendChild(div);
  });
}

function renderKPI(){
  const mon=getMon();
  const{year,month}=mon;
  const wDays=getWorkingDays(year,month);
  const dailyT=wDays.length>0?mon.target/wDays.length:0;
  const sJin=sumJin(),sOut=sumOut();
  const pct=mon.target>0?(sJin/mon.target*100):0;

  const kpis=[
    {label:"전체 진행",value:sJin,color:"#16A34A",icon:"📊",sub:"현대+기아 합계"},
    {label:"전체 출고",value:sOut,color:"#D97706",icon:"✅",sub:"월 누계"},
    {label:"현대 총 진행",value:sumKey("H진행"),color:"#3B82F6",icon:"🏭",sub:"월 누계"},
    {label:"현대 총 출고",value:sumKey("H출고"),color:"#1D4ED8",icon:"🚗",sub:"월 누계"},
    {label:"기아 총 진행",value:sumKey("K진행"),color:"#EF4444",icon:"🏭",sub:"월 누계"},
    {label:"기아 총 출고",value:sumKey("K출고"),color:"#DC2626",icon:"🚘",sub:"월 누계"},
    {label:"목표 달성율",value:(pct.toFixed(1)+'%'),color:pct>=100?"#16A34A":pct>=70?"#D97706":"#DC2626",icon:"🎯",sub:`목표 ${mon.target}대`,isStr:true},
  ];
  const row=document.getElementById('kpi-row');row.innerHTML='';
  kpis.forEach(k=>{
    const div=document.createElement('div');div.className='kpi-card';
    div.style.borderTop=`3px solid ${k.color}`;
    div.innerHTML=`<div class="kpi-label">${k.icon} ${k.label}</div><div class="kpi-value" style="color:${k.color}">${k.isStr?k.value:k.value.toLocaleString()}</div><div class="kpi-sub">${k.sub}</div>`;
    row.appendChild(div);
  });
}

function renderGoalBar(){
  const mon=getMon();
  const{year,month}=mon;
  const wDays=getWorkingDays(year,month);
  const dailyT=wDays.length>0?mon.target/wDays.length:0;
  const sJin=sumJin();
  const pct=mon.target>0?(sJin/mon.target*100):0;
  const holCount=Array.from({length:getDays(year,month)},(_,i)=>i+1).filter(d=>getDayStatus(year,month,d)==='holiday').length;

  document.getElementById('target-display').textContent=mon.target+'대';
  document.getElementById('goal-stats').innerHTML=`
    <span>📅 워킹데이 <strong style="color:#1D4ED8">${wDays.length}일</strong></span>
    <span>📊 일 목표 <strong style="color:#6B3FA0">${dailyT.toFixed(1)}대</strong></span>
    <span>🎌 공휴일 <strong style="color:#BE185D">${holCount}일</strong></span>
    <span>📈 현재 진행 <strong style="color:#16A34A">${sJin}대</strong></span>
  `;
  const pctColor=pct>=100?"#16A34A":pct>=70?"#F59E0B":"#6B3FA0";
  document.getElementById('pct-label').textContent=pct.toFixed(1)+'%';
  document.getElementById('pct-label').style.color=pctColor;
  document.getElementById('pct-label').style.fontWeight='700';
  const fill=document.getElementById('progress-fill');
  fill.style.width=Math.min(100,pct)+'%';fill.style.background=pctColor;
  document.getElementById('progress-note').textContent=`총 진행 ${sJin}대 / 목표 ${mon.target}대`;
}

function renderTable(){
  const mon=getMon();
  const{year,month}=mon;
  const days=getDays(year,month);
  const dayArr=Array.from({length:days},(_,i)=>i+1);
  const weeks=getWeeks(year,month);
  const wDays=getWorkingDays(year,month);
  const dailyT=wDays.length>0?mon.target/wDays.length:0;

  const colW=Math.max(30,Math.floor(520/days));

  let html=`<table><colgroup><col style="width:72px"><col style="width:28px">`;
  dayArr.forEach(()=>{html+=`<col style="width:${colW}px">`;});
  html+=`<col style="width:46px"></colgroup><thead>`;

  // 제목
  html+=`<tr><th class="th-title" colspan="${2+days+1}">${mLabel(year,month)} 주간실적 보고</th></tr>`;

  // 주차
  html+=`<tr><th class="th-item">항목</th><th class="th-brand"></th>`;
  weeks.forEach((wk,wi)=>{
    html+=`<th class="th-week" colspan="${wk.length}" style="background:${wi%2===0?'#2D3748':'#374151'}">${wi+1}주차</th>`;
  });
  html+=`<th class="th-total-hd" rowspan="2">총 합</th></tr>`;

  // 날짜
  html+=`<tr><th style="background:#1F2937;border-right:1px solid #555;border-bottom:1px solid #555;padding:4px 2px"></th><th style="background:#1F2937;border-right:1px solid #555;border-bottom:1px solid #555"></th>`;
  dayArr.forEach(d=>{
    const st=getDayStatus(year,month,d);
    const hol=st==='holiday',wend=st==='weekend';
    const dow=DOW[new Date(year,month-1,d).getDay()];
    const bg=hol?'#831843':wend?'#4B5563':'#1F2937';
    const tc=hol?'#FDE8F0':wend?'#FCA5A5':'#D1D5DB';
    html+=`<th class="th-day" style="background:${bg};color:${tc}"><div>${d}</div><div>${hol?'🎌':dow}</div></th>`;
  });
  html+=`</tr></thead><tbody>`;

  // 데이터 행
  const groups=[
    {grp:"현대",color:"#3B82F6",rows:[
      {key:"H진행",label:"진행 대수",bg:"#EFF6FF",color:"#1D4ED8"},
      {key:"H발주",label:"발주 대수",bg:"#fff",color:"#3B82F6"},
      {key:"H출고",label:"발주 출고",bg:"#fff",color:"#1D4ED8"},
    ]},
    {grp:"기아",color:"#EF4444",rows:[
      {key:"K진행",label:"진행 대수",bg:"#FFF0F0",color:"#DC2626"},
      {key:"K발주",label:"발주 대수",bg:"#fff",color:"#EF4444"},
      {key:"K출고",label:"발주 출고",bg:"#fff",color:"#DC2626"},
    ]},
  ];

  groups.forEach(({grp,color,rows})=>{
    rows.forEach((row,ri)=>{
      html+=`<tr><td class="row-label">${row.label}</td>`;
      if(ri===0){
        html+=`<td class="brand-cell" rowspan="3" style="background:${color}">${grp}</td>`;
      }
      dayArr.forEach(d=>{
        const st=getDayStatus(year,month,d);
        const off=st!=='working',hol=st==='holiday';
        const val=getVal(row.key,d);
        const bg=hol?'#FFF0F5':off?'#F1F5F9':row.bg;
        const tc=off?'#9CA3AF':row.color;
        const fw=val?700:400;
        html+=`<td class="data-cell" style="background:${bg}">
          <input type="number" min="0" value="${val??''}"
            style="color:${tc};font-weight:${fw}"
            ${off?'disabled':''} 
            data-key="${row.key}" data-day="${d}"
            onchange="handleInput(this)"
            onfocus="if(!this.disabled)this.parentElement.style.background='#FEF9C3'"
            onblur="this.parentElement.style.background='${bg}'">
          ${!off?`<div class="spin-btns">
            <button class="spin-btn" onclick="spinVal(this.closest('td').querySelector('input'),1)">▲</button>
            <button class="spin-btn" onclick="spinVal(this.closest('td').querySelector('input'),-1)">▼</button>
          </div>`:''}
        </td>`;
      });
      const tot=sumKey(row.key);
      html+=`<td class="sum-cell">${tot||''}</td></tr>`;
    });
  });

  // 총 진행
  html+=`<tr><td class="computed-label" colspan="2" style="background:#FFFBEB;color:#D97706">총 진행 대수</td>`;
  let sJinTotal=0;
  dayArr.forEach(d=>{
    const st=getDayStatus(year,month,d);const off=st!=='working',hol=st==='holiday';
    const v=totalJin(d);sJinTotal+=v;
    const bg=hol?'#FFF0F5':off?'#F1F5F9':'#FFFBEB';
    const tc=off?'#9CA3AF':v>0?'#D97706':'#9CA3AF';
    const fw=v>0?800:400;
    html+=`<td class="computed-cell" style="background:${bg};color:${tc};font-weight:${fw}">${!off?(v>0?v:'0'):''}</td>`;
  });
  html+=`<td class="computed-total" style="background:#F59E0B;color:#fff">${sJinTotal}</td></tr>`;

  // 총 출고
  html+=`<tr><td class="computed-label" colspan="2" style="background:#F0FDF4;color:#16A34A">총 출고 대수</td>`;
  let sOutTotal=0;
  dayArr.forEach(d=>{
    const st=getDayStatus(year,month,d);const off=st!=='working',hol=st==='holiday';
    const v=totalOut(d);sOutTotal+=v;
    const bg=hol?'#FFF0F5':off?'#F1F5F9':v>0?'#DCFCE7':'#F0FDF4';
    const tc=off?'#9CA3AF':v>0?'#16A34A':'#9CA3AF';
    const fw=v>0?800:400;
    html+=`<td class="computed-cell" style="background:${bg};color:${tc};font-weight:${fw}">${!off?(v>0?v:'0'):''}</td>`;
  });
  html+=`<td class="computed-total" style="background:#16A34A;color:#fff">${sOutTotal}</td></tr>`;

  // 일별 목표
  html+=`<tr><td class="computed-label" colspan="2" style="background:#EFF6FF;color:#1D4ED8">일별 목표 (${dailyT.toFixed(1)}대)</td>`;
  dayArr.forEach(d=>{
    const st=getDayStatus(year,month,d);const off=st!=='working',hol=st==='holiday';
    const bg=hol?'#FFF0F5':off?'#F1F5F9':'#EFF6FF';
    const tc=off?'#9CA3AF':'#1D4ED8';
    html+=`<td class="computed-cell" style="background:${bg};color:${tc};font-size:9px;font-weight:600">${!off?dailyT.toFixed(1):''}</td>`;
  });
  html+=`<td class="computed-total" style="background:#1D4ED8;color:#fff;font-size:10px">${mon.target}</td></tr>`;

  // 목표 달성율
  html+=`<tr><td class="computed-label" colspan="2" style="background:#F3EEF9;color:#6B3FA0">목표 달성율 <span style="font-size:9px;font-weight:400;color:#9CA3AF">(진행÷일목표)</span></td>`;
  dayArr.forEach(d=>{
    const st=getDayStatus(year,month,d);const off=st!=='working',hol=st==='holiday';
    const jin=totalJin(d);
    const pct=(!off&&dailyT>0&&jin>0)?(jin/dailyT*100):null;
    const bg=hol?'#FFF0F5':off?'#F1F5F9':pct===null?'#F3EEF9':pct>=100?'#DCFCE7':pct>=70?'#FEF9C3':'#FEE2E2';
    const tc=pct===null?'#9CA3AF':pct>=100?'#16A34A':pct>=70?'#D97706':'#DC2626';
    const fw=pct&&pct>0?700:400;
    html+=`<td class="computed-cell" style="background:${bg};color:${off?'#9CA3AF':tc};font-weight:${fw};font-size:9px">${!off&&pct!==null?pct.toFixed(0)+'%':''}</td>`;
  });
  const totPct=mon.target>0?(sJinTotal/mon.target*100):0;
  html+=`<td class="computed-total" style="background:#6B3FA0;color:#fff;font-size:11px">${mon.target>0?totPct.toFixed(1)+'%':'-'}</td></tr>`;

  html+=`</tbody></table>`;
  document.getElementById('table-wrap').innerHTML=html;
}

// ── 이벤트 ────────────────────────────────────────────────────────────────────
// ▲▼ 스피너
function spinVal(inp, delta) {
  if (inp.disabled) return;
  const cur = parseInt(inp.value) || 0;
  inp.value = Math.max(0, cur + delta);
  handleInput(inp);
}

// 발주 차량 관리
function getOrders() {
  const mon = getMon();
  if (!mon.orders) mon.orders = {};
  return mon.orders;
}

let _orderWeek = 0;

function renderOrderSection() {
  const mon = getMon();
  const { year, month } = mon;
  const days = getDays(year, month);
  const orders = getOrders();
  const weeks = getWeeks(year, month);
  const tabsEl = document.getElementById('order-tabs');
  const bodyEl = document.getElementById('order-body');
  if (!tabsEl || !bodyEl) return;

  if (_orderWeek >= weeks.length) _orderWeek = 0;

  // 주차 탭
  tabsEl.innerHTML = '';
  weeks.forEach((wk, wi) => {
    const btn = document.createElement('button');
    btn.className = 'order-tab' + (wi === _orderWeek ? ' active' : '');
    btn.textContent = wi+1 + '주차 (' + wk[0] + '~' + wk[wk.length-1] + '일)';
    btn.onclick = () => { _orderWeek = wi; renderOrderSection(); };
    tabsEl.appendChild(btn);
  });

  const wkDays = weeks[_orderWeek] || [];

  // 날짜 카드
  let html = '<div class="order-day-grid">';
  wkDays.forEach(d => {
    const st = getDayStatus(year, month, d);
    const dow = ['일','월','화','수','목','금','토'][new Date(year, month-1, d).getDay()];
    const isHol = st === 'holiday';
    const isOff = st !== 'working';
    const titleCls = isHol ? 'holiday' : isOff ? 'weekend' : '';
    const cars = orders[d] || [];
    html += '<div class="order-day-card">';
    html += '<div class="order-day-title ' + titleCls + '"><span>' + d + '일(' + dow + ')</span><span>' + (cars.length > 0 ? cars.length + '대' : '') + '</span></div>';
    html += '<div class="order-car-list" id="olist-' + d + '">';
    cars.forEach((car, ci) => {
      html += '<div class="order-car-item"><input type="text" value="' + (car||'').replace(/"/g,'&quot;') + '" placeholder="차량 모델" maxlength="20" onchange="updateCar(' + d + ',' + ci + ',this.value)" onblur="updateCar(' + d + ',' + ci + ',this.value)"><button onclick="removeCar(' + d + ',' + ci + ')">✕</button></div>';
    });
    if (!isOff) html += '<button class="order-add-btn" onclick="addCar(' + d + ')">+ 차량 추가</button>';
    html += '</div></div></div>';
  });
  html += '</div>';

  // 월 집계
  const allCars = {};
  for (let d = 1; d <= days; d++) {
    (orders[d] || []).forEach(car => {
      const t = (car||'').trim();
      if (t) allCars[t] = (allCars[t] || 0) + 1;
    });
  }
  const sorted = Object.entries(allCars).sort((a,b) => b[1]-a[1]);
  if (sorted.length > 0) {
    html += '<div class="order-summary"><h3>📊 월 발주 차량 집계</h3><div class="order-summary-grid">';
    sorted.forEach(([car, cnt]) => {
      html += '<div class="order-car-badge"><span>' + car + '</span><span>' + cnt + '대</span></div>';
    });
    html += '</div></div>';
  }
  bodyEl.innerHTML = html;
}

function addCar(day) {
  const orders = getOrders();
  if (!orders[day]) orders[day] = [];
  orders[day].push('');
  renderOrderSection();
  setTimeout(() => {
    const el = document.getElementById('olist-' + day);
    if (el) { const ins = el.querySelectorAll('input'); if (ins.length) ins[ins.length-1].focus(); }
  }, 50);
}

function removeCar(day, idx) {
  const orders = getOrders();
  if (orders[day]) { orders[day].splice(idx, 1); if (!orders[day].length) delete orders[day]; }
  renderOrderSection();
}

function updateCar(day, idx, val) {
  const orders = getOrders();
  if (!orders[day]) orders[day] = [];
  orders[day][idx] = val.trim();
  // 집계 업데이트
  const mon = getMon();
  const days = getDays(mon.year, mon.month);
  const allCars = {};
  for (let d = 1; d <= days; d++) {
    (orders[d] || []).forEach(car => {
      const t = (car||'').trim();
      if (t) allCars[t] = (allCars[t] || 0) + 1;
    });
  }
  const sorted = Object.entries(allCars).sort((a,b) => b[1]-a[1]);
  const bodyEl = document.getElementById('order-body');
  if (!bodyEl) return;
  let sumEl = bodyEl.querySelector('.order-summary');
  if (sorted.length === 0) { if (sumEl) sumEl.innerHTML = ''; return; }
  if (!sumEl) { sumEl = document.createElement('div'); sumEl.className = 'order-summary'; bodyEl.appendChild(sumEl); }
  let html = '<h3>📊 월 발주 차량 집계</h3><div class="order-summary-grid">';
  sorted.forEach(([car, cnt]) => { html += '<div class="order-car-badge"><span>' + car + '</span><span>' + cnt + '대</span></div>'; });
  html += '</div>';
  sumEl.innerHTML = html;
}

function handleInput(el){
  const key=el.dataset.key,day=parseInt(el.dataset.day);
  const v=el.value===''?null:parseInt(el.value);
  if(el.value!==''&&(isNaN(v)||v<0)){el.value='';return;}
  const mon=getMon();
  if(v===null){delete mon[key][day];}else{mon[key][day]=v;}
  // 합계/KPI만 업데이트 (테이블 전체 재렌더 없이)
  renderKPI();renderGoalBar();
  // 총합 셀 업데이트
  updateSumCells();
  updateComputedRows();
}

function updateSumCells(){
  // 각 행 총합 셀 업데이트
  const keys=["H진행","H발주","H출고","K진행","K발주","K출고"];
  const sumCells=document.querySelectorAll('.sum-cell');
  keys.forEach((key,i)=>{
    if(sumCells[i])sumCells[i].textContent=sumKey(key)||'';
  });
}

function updateComputedRows(){
  const mon=getMon();const{year,month}=mon;
  const days=getDays(year,month);
  const wDays=getWorkingDays(year,month);
  const dailyT=wDays.length>0?mon.target/wDays.length:0;
  const computedCells=document.querySelectorAll('.computed-cell');
  const computedTotals=document.querySelectorAll('.computed-total');
  const dayArr=Array.from({length:days},(_,i)=>i+1);

  let sJin=0,sOut=0;
  dayArr.forEach((d,i)=>{
    const st=getDayStatus(year,month,d);const off=st!=='working',hol=st==='holiday';
    const jin=totalJin(d),out=totalOut(d);
    sJin+=jin;sOut+=out;
    // 총진행
    const jinCell=computedCells[i];
    if(jinCell){
      const bg=hol?'#FFF0F5':off?'#F1F5F9':'#FFFBEB';
      jinCell.style.background=bg;
      jinCell.style.color=off?'#9CA3AF':jin>0?'#D97706':'#9CA3AF';
      jinCell.style.fontWeight=jin>0?800:400;
      jinCell.textContent=!off?(jin>0?jin:'0'):'';
    }
    // 총출고
    const outCell=computedCells[days+i];
    if(outCell){
      const bg=hol?'#FFF0F5':off?'#F1F5F9':out>0?'#DCFCE7':'#F0FDF4';
      outCell.style.background=bg;
      outCell.style.color=off?'#9CA3AF':out>0?'#16A34A':'#9CA3AF';
      outCell.style.fontWeight=out>0?800:400;
      outCell.textContent=!off?(out>0?out:'0'):'';
    }
    // 달성율
    const pctCell=computedCells[days*3+i];
    if(pctCell){
      const pct=(!off&&dailyT>0&&jin>0)?(jin/dailyT*100):null;
      const bg=hol?'#FFF0F5':off?'#F1F5F9':pct===null?'#F3EEF9':pct>=100?'#DCFCE7':pct>=70?'#FEF9C3':'#FEE2E2';
      const tc=pct===null?'#9CA3AF':pct>=100?'#16A34A':pct>=70?'#D97706':'#DC2626';
      pctCell.style.background=bg;
      pctCell.style.color=off?'#9CA3AF':tc;
      pctCell.style.fontWeight=pct&&pct>0?700:400;
      pctCell.textContent=!off&&pct!==null?pct.toFixed(0)+'%':'';
    }
  });
  if(computedTotals[0])computedTotals[0].textContent=sJin;
  if(computedTotals[1])computedTotals[1].textContent=sOut;
  const totPct=mon.target>0?(sJin/mon.target*100):0;
  if(computedTotals[3])computedTotals[3].textContent=mon.target>0?totPct.toFixed(1)+'%':'-';
}

// 목표 수정
function toggleTargetEdit(){
  const inp=document.getElementById('target-input');
  const btn=document.getElementById('btn-edit-target');
  const disp=document.getElementById('target-display');
  if(inp.style.display==='none'||inp.style.display===''){
    inp.value=getMon().target;inp.style.display='inline-block';
    disp.style.display='none';btn.style.display='none';inp.focus();
  } else {
    inp.style.display='none';disp.style.display='';btn.style.display='';
  }
}
function targetKeyDown(e){
  if(e.key==='Enter'){
    const v=parseInt(document.getElementById('target-input').value);
    if(!isNaN(v)&&v>0){getMon().target=v;toggleTargetEdit();renderKPI();renderGoalBar();updateComputedRows();}
  }
  if(e.key==='Escape')toggleTargetEdit();
}

// 월 추가/삭제
function showAddModal(){document.getElementById('modal-overlay').classList.add('show');updateModalInfo();}
function hideModal(){document.getElementById('modal-overlay').classList.remove('show');}
function updateModalInfo(){
  const m=parseInt(document.getElementById('add-month').value);
  const info=document.getElementById('modal-target-info');
  if(MONTH_TARGETS[m]){
    info.style.background='#F3EEF9';info.style.color='#6B3FA0';
    info.innerHTML=`🎯 ${m}월 목표: <strong>${MONTH_TARGETS[m]}대</strong> 자동 설정`;
  } else {
    info.style.background='#FFF7ED';info.style.color='#92400E';
    info.textContent='⚠️ 목표 미설정 월입니다. 추가 후 수정하세요.';
  }
}
function addMonth(){
  const y=parseInt(document.getElementById('add-year').value);
  const m=parseInt(document.getElementById('add-month').value);
  const key=mKey(y,m);
  if(!state.order.includes(key)){
    state.months[key]=makeEmpty(y,m);
    state.order=[...state.order,key].sort((a,b)=>b.localeCompare(a));
    state.active=key;
  } else {state.active=key;}
  hideModal();render();
}
function deleteMonth(key){
  if(state.order.length<=1||!confirm('삭제할까요?'))return;
  state.order=state.order.filter(k=>k!==key);
  delete state.months[key];
  state.active=state.order[0];
  render();
}

// ── 초기화 ────────────────────────────────────────────────────────────────────
// Firebase에서 먼저 데이터를 불러오고, 없으면 초기값 사용
let initialized = false;
state = loadState();
render(); // 초기 렌더 (탭/버튼 표시용)

DATA_REF.on("value", (snapshot) => {
  const data = snapshot.val();
  if (data && data.months && data.order && data.order.length > 0) {
    const currentActive = state.active;
    state = data;
    // 현재 선택된 탭 유지 (존재하면)
    if (currentActive && data.months[currentActive]) {
      state.active = currentActive;
    } else {
      state.active = data.order[0];
    }
    render();
    if (initialized) {
      showSyncToast("🔄 데이터가 동기화되었습니다");
    } else {
      initialized = true;
    }
  } else {
    // Firebase에 데이터 없으면 초기값으로 시작
    initialized = true;
  }
});
